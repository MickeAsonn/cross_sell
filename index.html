
<!DOCTYPE html><html lang='sv'><head><meta charset='UTF-8'>
<title>Account Plan Advanced</title>
<link rel='stylesheet' href='styles.css'>
<script src='https://cdn.jsdelivr.net/npm/chart.js'></script>
<script src='https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js'></script>
</head>
<body onload='checkLogin()'>
<div id='loginBox' class='hidden'>
<h2>Login</h2>
<input id='user' placeholder='Användare'><br>
<input id='pass' type='password' placeholder='Lösenord'><br>
<button onclick='login()'>Login</button>
</div>
<div id='app' class='hidden'>
<h1>Cross Selling Account Plan</h1>
<input id='search' placeholder='Sök...' onkeyup='filterEntries()'>
<form id='form'>
<h2>Kundinfo</h2>
<input name='Kundenavn' placeholder='Kundenavn'>
<input name='Adresse' placeholder='Adresse'>
<input name='Postnr' placeholder='Postnr'>
<input name='By' placeholder='By'>
<input name='Land' placeholder='Land'>
<input name='Ledelsesansvarlig' placeholder='Ledelsesansvarlig'>
<input name='SF' placeholder='Salgsansvarlig SF'>
<input name='IB' placeholder='Salgsansvarlig IB'>
<input name='GP' placeholder='Salgsansvarlig GP'>
<input name='Media' placeholder='Salgsansvarlig Media'>
<h2>Tal</h2>
<input type='number' name='Omsætning' placeholder='Omsætning'>
<input type='number' name='TotalPotential' placeholder='Potentiale år DKK'>
<input type='number' name='Budget' placeholder='Budget år DKK'>
<input type='number' name='Realiseret' placeholder='Realiseret år DKK'>
<h2>Produktområden</h2>
<div id='prod'></div>
<h2>Aktiviteter</h2>
<input type='date' name='ActivityDate'>
<textarea name='ActivityDescription' placeholder='Beskrivning'></textarea>
<button type='button' onclick='saveEntry()'>Spara</button>
</form>
<h2>Dashboard</h2>
<canvas id='revChart'></canvas>
<h2>Kundlista</h2>
<table id='tbl'></table>
<button onclick='exportExcel()'>Exportera till Excel</button>
</div>
<script src='app.js'></script>
<script src='login.js'></script>
<script src='sharepoint.js'></script>
</body></html>
