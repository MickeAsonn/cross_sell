<!DOCTYPE html><html lang='sv'><head><meta charset='UTF-8'><title>Cross Selling Account Plan</title><link rel='stylesheet' href='styles.css'></head><body><h1>Cross Selling Account Plan</h1><form id='form'><h2>Kundinformation</h2><div class='grid-2'><div><label>Kundenavn</label><input name='Kundenavn'></div><div><label>Adresse</label><input name='Adresse'></div><div><label>Postnr</label><input name='Postnr'></div><div><label>By</label><input name='By'></div><div><label>Land</label><input name='Land'></div><div><label>Ledelsesansvarlig</label><input name='Ledelsesansvarlig'></div><div><label>Salgsansvarlig – SF</label><input name='SF'></div><div><label>Salgsansvarlig – IB</label><input name='IB'></div><div><label>Salgsansvarlig – GP</label><input name='GP'></div><div><label>Salgsansvarlig – Media</label><input name='Media'></div></div><h2>Tal</h2><div class='grid-2'><div><label>Omsætning</label><input type='number' name='Omsætning'></div><div><label>Potentiale år DKK</label><input type='number' name='TotalPotential'></div><div><label>Budget år DKK</label><input type='number' name='Budget'></div><div><label>Realiseret år DKK</label><input type='number' name='Realiseret'></div></div><h2>Produktområder & potential</h2><div class='product-grid'><div><label><input type='checkbox' name='WebOffset'> Web offset</label><input name='WebOffsetPotential' placeholder='Potential DKK'></div><div><label><input type='checkbox' name='POS'> POS</label><input name='POSPotential' placeholder='Potential DKK'></div><div><label><input type='checkbox' name='Sheetfed'> Sheetfed</label><input name='SheetfedPotential' placeholder='Potential DKK'></div><div><label><input type='checkbox' name='DigitalPrint'> Digital print</label><input name='DigitalPrintPotential' placeholder='Potential DKK'></div><div><label><input type='checkbox' name='MediaProd'> Media</label><input name='MediaProdPotential' placeholder='Potential DKK'></div><div><label><input type='checkbox' name='Storage'> Storage/logistic</label><input name='StoragePotential' placeholder='Potential DKK'></div><div><label><input type='checkbox' name='Distribution'> Distribution</label><input name='DistributionPotential' placeholder='Potential DKK'></div><div><label><input type='checkbox' name='Portal'> Portal</label><input name='PortalPotential' placeholder='Potential DKK'></div><div><label><input type='checkbox' name='Packaging'> Packaging</label><input name='PackagingPotential' placeholder='Potential DKK'></div><div><label><input type='checkbox' name='EventExpo'> Event & Expo</label><input name='EventExpoPotential' placeholder='Potential DKK'></div><div><label><input type='checkbox' name='InStoreCom'> In-store communication</label><input name='InStoreComPotential' placeholder='Potential DKK'></div><div><label><input type='checkbox' name='InStoreInst'> In-store installation</label><input name='InStoreInstPotential' placeholder='Potential DKK'></div><div><label><input type='checkbox' name='OutdoorInst'> Out-door installation</label><input name='OutdoorInstPotential' placeholder='Potential DKK'></div><div><label><input type='checkbox' name='Other'> Other</label><input name='OtherPotential' placeholder='Potential DKK'></div></div><h2>Aktiviteter</h2><div class='grid-2'><div><label>Dato</label><input type='date' name='ActivityDate'></div><div><label>Beskrivning</label><textarea name='ActivityDescription'></textarea></div></div><button type='button' onclick='save()'>Spara kund</button></form><script src='app.js'></script></body></html>
