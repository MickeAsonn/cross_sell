
<!DOCTYPE html>
<html lang='sv'>
<head>
<meta charset='UTF-8'>
<title>Cross Selling Account Plan</title>
<link rel='stylesheet' href='styles.css'>
</head>
<body>
<h1>Cross Selling Account Plan – Ifyllnadsbar</h1>
<form id='form'>
<h2>Kundinformation</h2>
<label>Kundenavn</label><input name='Kundenavn'>
<label>Adresse</label><input name='Adresse'>
<label>Postnr</label><input name='Postnr'>
<label>By</label><input name='By'>
<label>Land</label><input name='Land'>
<label>Ledelsesansvarlig</label><input name='Ledelsesansvarlig'>
<label>Salgsansvarlig - SF</label><input name='SF'>
<label>Salgsansvarlig - IB</label><input name='IB'>
<label>Salgsansvarlig - GP</label><input name='GP'>
<label>Salgsansvarlig - Media</label><input name='Media'>

<h2>Tal</h2>
<label>Omsætning</label><input type='number' name='Omsætning'>
<label>Potentiale år DKK</label><input type='number' name='Potentiale'>
<label>Budget år DKK</label><input type='number' name='Budget'>
<label>Realiseret år DKK</label><input type='number' name='Realiseret'>

<h2>Produktområder</h2>
<label><input type='checkbox' name='Web offset'> Web offset</label>
<label><input type='checkbox' name='POS'> POS</label>
<label><input type='checkbox' name='Sheetfed'> Sheetfed</label>
<label><input type='checkbox' name='Digital print'> Digital print</label>
<label><input type='checkbox' name='MediaProd'> Media</label>
<label><input type='checkbox' name='Storage'> Storage/logistic</label>
<label><input type='checkbox' name='Distribution'> Distribution</label>
<label><input type='checkbox' name='Portal'> Portal</label>
<label><input type='checkbox' name='Packaging'> Packaging</label>
<label><input type='checkbox' name='EventExp'> Event & Expo</label>
<label><input type='checkbox' name='InStoreCom'> In-store communication</label>
<label><input type='checkbox' name='InStoreInst'> In-store installation</label>
<label><input type='checkbox' name='OutdoorInst'> Out-door installation</label>
<label><input type='checkbox' name='Other'> Other</label>

<h2>Aktivitet</h2>
<label>Dato</label><input type='date' name='ActivityDate'>
<label>Beskrivning</label><textarea name='ActivityDescription'></textarea>

<button type='button' onclick='save()'>Spara kund</button>
</form>

<script src='app.js'></script>
</body></html>
